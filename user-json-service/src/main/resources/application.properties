server.port=8081
spring.application.name=user-json-service

# H2 in-memory database (Option 2: Independent Databases)
spring.datasource.url=jdbc:h2:mem:profiledb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SOAP service URL for token validation
soap.service.url=http://localhost:8080/ws
